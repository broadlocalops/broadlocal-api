<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Order | BroadLocal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 0;
    }

    .wrap {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    h1 {
      margin-bottom: 16px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .btn {
      background: #1e3c2c;
      color: white;
      padding: 12px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    .btn-outline {
      background: white;
      border: 1px solid #1e3c2c;
      color: #1e3c2c;
    }

    .upgrade {
      border: 1px solid #ddd;
      padding: 12px;
      margin: 8px 0;
      cursor: pointer;
    }

    .upgrade.selected {
      border: 2px solid #1e3c2c;
      background: #f0f6f2;
    }

    .total {
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="wrap">

  <h1>Complete Your Order</h1>

  <div id="product"></div>

  <h3>Add Recommended Systems</h3>

  <div class="upgrade" data-id="payroll-documentation-readiness">
    Payroll Documentation Readiness — $297
  </div>

  <div class="upgrade" data-id="new-hire-documentation">
    New Hire Documentation System — $297
  </div>

  <div class="upgrade" data-id="work-schedule-documentation">
    Work Schedule Documentation — $197
  </div>

  <button id="bundleBtn" class="btn">
    Upgrade to Full Suite ($597)
  </button>

  <div class="total" id="total"></div>

  <button id="checkoutBtn" class="btn">
    Secure My Package →
  </button>

  <button id="continueBtn" class="btn btn-outline">
    Continue With Current Order
  </button>

</div>

<script>

const API_URL = "https://broadlocal-api.onrender.com/api/create-checkout-session";

const PRODUCTS = {
  "employee-notice-documentation": 297,
  "termination-documentation-system": 497,
  "payroll-documentation-readiness": 297,
  "new-hire-documentation": 297,
  "work-schedule-documentation": 197
};

const UPGRADES = [
  "payroll-documentation-readiness",
  "new-hire-documentation",
  "work-schedule-documentation"
];

const urlParams = new URLSearchParams(window.location.search);
const productParam = urlParams.get("product");

let baseProduct = productParam || "employee-notice-documentation";
let selected = [];

// 🔥 CRITICAL FIX: reset state on new entry
if (productParam) {
  localStorage.removeItem("cart_upgrades");
} else {
  try {
    selected = JSON.parse(localStorage.getItem("cart_upgrades")) || [];
  } catch {
    selected = [];
  }
}

function calcTotal() {
  let total = PRODUCTS[baseProduct] || 0;

  if (UPGRADES.every(u => selected.includes(u))) {
    return total + 597;
  }

  selected.forEach(u => total += PRODUCTS[u] || 0);
  return total;
}

function render() {
  document.getElementById("product").innerText =
    `${baseProduct} — $${PRODUCTS[baseProduct]}`;

  document.getElementById("total").innerText =
    `Total: $${calcTotal()}`;

  document.querySelectorAll(".upgrade").forEach(el => {
    const id = el.dataset.id;
    el.classList.toggle("selected", selected.includes(id));
  });
}

document.querySelectorAll(".upgrade").forEach(el => {
  el.onclick = () => {
    const id = el.dataset.id;

    if (selected.includes(id)) {
      selected = selected.filter(x => x !== id);
    } else {
      selected.push(id);
    }

    localStorage.setItem("cart_upgrades", JSON.stringify(selected));
    render();
  };
});

document.getElementById("bundleBtn").onclick = () => {
  startCheckout({
    baseProduct: { slug: baseProduct },
    addOns: [],
    bundleActive: true
  });
};

document.getElementById("checkoutBtn").onclick = () => {
  startCheckout({
    baseProduct: { slug: baseProduct },
    addOns: selected.map(s => ({ slug: s })),
    bundleActive: UPGRADES.every(u => selected.includes(u))
  });
};

document.getElementById("continueBtn").onclick = () => {
  startCheckout({
    baseProduct: { slug: baseProduct },
    addOns: [],
    bundleActive: false
  });
};

async function startCheckout(payload) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!data.url) {
      alert("Checkout failed.");
      return;
    }

    window.location.href = data.url;

  } catch (err) {
    alert("Network error.");
    console.error(err);
  }
}

render();

</script>

</body>
</html>
